name: arm64-deploy-verify

# 在 GitHub arm64 runner 上全新部署 arm64 离线栈, 并验证:
#   1) 3 个 web 端口登录可用
#   2) 功能菜单(API 复刻登录): 18 模块 / 224 功能点 + 侧边栏关键页面解锁
#   3) PrimiHub logo 已替换
#   4) 真·无头浏览器(Playwright): 登录后侧边栏菜单项数达标 + 截图存档
#
# 注意: 工作流必须放在仓库根 .github/workflows/ 才会被 Actions 执行;
#       所有步骤 working-directory 指向 arm64-deploy。
on:
  push:
    branches: [ develop, main ]
    paths: [ 'arm64-deploy/**', '.github/workflows/arm64-deploy-verify.yml' ]
  workflow_dispatch:

env:
  ACR: registry.cn-beijing.aliyuncs.com

defaults:
  run:
    working-directory: arm64-deploy

jobs:
  deploy-verify:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v4
      - run: uname -m && free -h && docker --version

      - name: Login to Aliyun ACR
        run: echo "${{ secrets.ALIYUN_PASSWORD }}" | docker login "$ACR" --username "${{ secrets.ALIYUN_USERNAME }}" --password-stdin

      - name: Prepare runtime dirs
        run: mkdir -p data/mysql data/log primihub-node data/result

      - name: Pull all arm64 images
        run: docker compose --env-file .env pull

      - name: Deploy (compose up)
        run: docker compose --env-file .env up -d

      - name: Wait for API ready (login) on 3 web ports
        run: |
          # NOTE: GitHub runs this with `bash -eo pipefail`. `grep -c` exits 1
          # when it finds 0 matches, which under set -e aborts the whole loop on
          # the first not-ready poll (the reason this step never polled past
          # round 1). Guard every substitution with `|| true`.
          PASS=0
          for round in $(seq 1 80); do
            sleep 30
            up=$(docker ps --format '{{.Names}}' | wc -l | tr -d ' ' || true)
            ok=0
            for p in 30811 30812 30813; do
              c=$(curl -s -m8 "http://127.0.0.1:$p/prod-api/sys/common/getValidatePublicKey" 2>/dev/null | grep -c publicKey || true)
              [ "$c" = "1" ] && ok=$((ok+1)) || true
            done
            echo "[round $round] containers_up=$up api_ready=$ok/3"
            if [ "$ok" = "3" ]; then PASS=1; break; fi
          done
          [ "$PASS" = "1" ] || { echo "::error::API not ready 3/3"; docker compose --env-file .env ps -a; exit 1; }

      - name: Verify function menus (API browser-equivalent login)
        run: |
          MPASS=1
          for p in 30811 30812 30813; do
            echo "---- :$p ----"
            python3 scripts/verify_menus.py "http://127.0.0.1:$p" admin 123456 || MPASS=0
          done
          [ "$MPASS" = "1" ] || { echo "::error::menu verify failed"; exit 1; }

      - name: Verify PrimiHub logo replaced
        run: |
          EXP=$(wc -c < config/logo-primihub.png | tr -d ' ')
          for p in 30811 30812 30813; do
            got=$(curl -s -m8 "http://127.0.0.1:$p/images/logo-DataItem.png" | wc -c | tr -d ' ')
            echo ":$p logo bytes=$got (expect $EXP)"
            [ "$got" = "$EXP" ] || { echo "::error::logo not replaced on $p"; exit 1; }
          done

      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Headless browser sidebar check (Playwright)
        run: |
          mkdir -p out
          npm init -y >/dev/null 2>&1
          npm i -D playwright@1.48 >/dev/null 2>&1
          npx playwright install --with-deps chromium
          for p in 30811 30812 30813; do
            echo "---- browser :$p ----"
            BASE="http://127.0.0.1:$p" MIN_ITEMS=120 OUT="out/sidebar_$p.png" node scripts/sidebar_check.mjs
          done

      - name: Upload artifacts (screenshots + logs)
        if: always()
        run: |
          mkdir -p out
          docker compose --env-file .env ps -a > out/ps.txt 2>&1 || true
          for c in mysql nacos-server application0 application1 application2 gateway0 manage-web0 meta0 node0; do
            docker logs --tail 200 "$c" > "out/$c.log" 2>&1 || true
          done
          # nacos writes detailed logs to a bind-mounted dir, not stdout
          cp -r data/log "out/nacos-filelogs" 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: arm64-deploy-verify
          path: arm64-deploy/out/*
