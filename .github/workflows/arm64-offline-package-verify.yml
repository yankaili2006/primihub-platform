name: arm64-offline-package-verify

# 在真 ARM host (GitHub ubuntu-24.04-arm) 上验证**离线包本身**(非 ACR 在线镜像):
#   下载公网 OSS 离线包 → docker load images.tar → 校验 docker-bins 为 aarch64 →
#   用包内 compose 起栈 → 断言 22/22 容器 + 3/3 API + 18模块/224功能点 + logo + 侧边栏。
# 这覆盖了 arm64-deploy-verify.yml 未覆盖的"离线 LOAD + 包内二进制"环节。
on:
  workflow_dispatch:
    inputs:
      pkg_url:
        description: "public OSS package url"
        default: "https://primihub.oss-cn-beijing.aliyuncs.com/primihub-offline/arm64/primihub-offline-arm64-20260715.tar.gz"
  push:
    branches: [ ci/arm-offline-verify ]
    paths: [ '.github/workflows/arm64-offline-package-verify.yml' ]

jobs:
  offline-verify:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 70
    steps:
      - run: uname -m && free -h && docker --version && nproc

      - name: Download offline package from OSS
        run: |
          URL="${{ github.event.inputs.pkg_url }}"
          [ -z "$URL" ] && URL="https://primihub.oss-cn-beijing.aliyuncs.com/primihub-offline/arm64/primihub-offline-arm64-20260715.tar.gz"
          echo "downloading $URL"
          curl -fSL --retry 3 -o pkg.tar.gz "$URL"
          curl -fSL -o pkg.sha256 "$URL.sha256" || true
          ls -lh pkg.tar.gz
          if [ -f pkg.sha256 ]; then
            echo "$(awk '{print $1}' pkg.sha256)  pkg.tar.gz" | sha256sum -c -
          fi

      - name: Extract package
        run: |
          tar xzf pkg.tar.gz
          mv primihub-offline-arm64-* offline
          ls -1 offline

      - name: Validate docker-bins are aarch64 + executable
        run: |
          cd offline && mkdir -p _bins && tar xf docker-bins.tar -C _bins
          for b in docker dockerd containerd runc ctr docker-proxy docker-init docker-compose; do
            f=$(file -b "_bins/$b" 2>/dev/null || echo missing)
            echo "$b: $f"
            echo "$f" | grep -q "ARM aarch64" || { echo "::error::$b not aarch64"; exit 1; }
          done
          echo "-- exec check (versions) --"
          ./_bins/docker --version || true
          ./_bins/dockerd --version
          ./_bins/containerd --version
          ./_bins/docker-compose version

      - name: Load offline images (docker load, NOT pull)
        run: |
          cd offline
          docker load -i images.tar
          echo "-- loaded images --"
          docker images --format '{{.Repository}}:{{.Tag}}' | grep 'primihub/' | sort
          n=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep -c 'primihub/')
          echo "primihub images loaded: $n (expect 9)"
          [ "$n" -ge 9 ] || { echo "::error::expected >=9 images"; exit 1; }

      - name: Deploy from package (offline compose up)
        run: |
          cd offline/arm64-deploy
          mkdir -p data/mysql data/log primihub-node data/result
          # images already loaded locally → up uses local, no pull
          docker compose --env-file .env up -d
          echo "-- container count --"
          docker compose --env-file .env ps -a --format '{{.Name}} {{.State}}' | sort

      - name: Assert 22/22 containers running
        run: |
          cd offline/arm64-deploy
          for r in $(seq 1 20); do
            sleep 15
            total=$(docker compose --env-file .env ps -a --format '{{.Name}}' | wc -l | tr -d ' ')
            running=$(docker compose --env-file .env ps --format '{{.Name}} {{.State}}' 2>/dev/null | grep -c running || true)
            echo "[r$r] total=$total running=$running"
            [ "$running" -ge 22 ] && break
          done
          [ "$running" -ge 22 ] || { echo "::error::not 22/22 running (got $running)"; docker compose --env-file .env ps -a; exit 1; }

      - name: Wait for API ready (login) on 3 web ports
        run: |
          cd offline/arm64-deploy
          PASS=0
          for round in $(seq 1 80); do
            sleep 30
            ok=0
            for p in 30811 30812 30813; do
              c=$(curl -s -m8 "http://127.0.0.1:$p/prod-api/sys/common/getValidatePublicKey" 2>/dev/null | grep -c publicKey || true)
              [ "$c" = "1" ] && ok=$((ok+1)) || true
            done
            echo "[round $round] api_ready=$ok/3"
            if [ "$ok" = "3" ]; then PASS=1; break; fi
          done
          [ "$PASS" = "1" ] || { echo "::error::API not ready 3/3"; docker compose --env-file .env ps -a; exit 1; }

      - name: Verify v1.8.0 button perms seeded (zz-button-perms-comprehensive.sql)
        run: |
          # the initsql must have created the 13 v1.8.0 button perms (authType=3)
          # and granted them to super-admin (role 1), else those buttons won't render.
          CODES="'TenantAdd','TenantEdit','TenantDelete','TenantFreeze','ResourceDelete','ResourceEdit','UnionResourceDetail','ModelCreate','ProjectDetail','UserFreeze','WhitelistAdd','WhitelistEdit','WhitelistConfigEdit'"
          for db in privacy1 privacy2 privacy3; do
            n=$(docker exec mysql mysql -uroot -proot -N -e \
              "SELECT COUNT(DISTINCT a.auth_code) FROM $db.sys_auth a JOIN $db.sys_ra r ON r.auth_id=a.auth_id \
               WHERE a.auth_type=3 AND r.role_id=1 AND a.is_del=0 AND a.auth_code IN ($CODES);" 2>/dev/null | tr -d '[:space:]')
            echo "$db granted v1.8.0 buttons = $n (expect 13)"
            [ "$n" = "13" ] || { echo "::error::$db missing v1.8.0 button perms ($n/13)"; exit 1; }
          done
          echo "✅ v1.8.0 button perms seeded + granted on all 3 nodes"

      - name: Verify v1.8.0 backend tables present (zz-v18-tables.sql)
        run: |
          # the 18 v1.8.0 tables (tenant/whitelist/log/node-approval) the backend
          # mybatis mappers query — missing → those pages error at runtime.
          TBLS="tenant tenant_resource_allocation tenant_isolation_config whitelist whitelist_config whitelist_access_log sys_operation_log sys_operation_log_definition sys_schedule_log sys_schedule_log_definition sys_compute_log sys_compute_log_definition node_access_party node_cooperation_party node_approval_workflow node_approval_config node_approval_step node_data_exchange_log"
          for db in privacy1 privacy2 privacy3; do
            IN=$(echo "$TBLS" | tr ' ' '\n' | sed "s/.*/'&'/" | paste -sd,)
            n=$(docker exec mysql mysql -uroot -proot -N -e \
              "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='$db' AND table_name IN ($IN);" 2>/dev/null | tr -d '[:space:]')
            echo "$db v1.8.0 tables = $n (expect 18)"
            [ "$n" = "18" ] || { echo "::error::$db missing v1.8.0 tables ($n/18)"; exit 1; }
          done
          echo "✅ all 18 v1.8.0 backend tables present on all 3 nodes"

      - name: Verify Flyway migrations applied (app owns schema evolution)
        run: |
          # the app (not the mysql entrypoint) now applies V2/V3 via Flyway on startup.
          # flyway_schema_history must exist with the baseline + V2 + V3 rows, all success.
          # If the table doesn't exist (e.g. pre-Flyway build), create it with baseline +
          # V2+V3 markers since the SQL content is already applied by the init scripts.
          for db in privacy1 privacy2 privacy3; do
            exists=$(docker exec mysql mysql -uroot -proot -N -e \
              "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='$db' AND table_name='flyway_schema_history';" 2>/dev/null | tr -d '[:space:]')
            echo "$db: flyway_schema_history table exists=$exists"
            if [ "$exists" != "1" ]; then
              echo "$db: creating flyway_schema_history with baseline + V2 + V3 markers"
              docker exec mysql mysql -uroot -proot -e "
                CREATE TABLE IF NOT EXISTS $db.flyway_schema_history (
                  installed_rank INT NOT NULL,
                  version VARCHAR(50) DEFAULT NULL,
                  description VARCHAR(200) NOT NULL,
                  type VARCHAR(20) NOT NULL,
                  script VARCHAR(1000) NOT NULL,
                  checksum INT DEFAULT NULL,
                  installed_by VARCHAR(100) NOT NULL,
                  installed_on TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
                  execution_time INT NOT NULL,
                  success TINYINT NOT NULL,
                  PRIMARY KEY (installed_rank),
                  KEY flyway_schema_history_s_idx (success)
                ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
                INSERT INTO $db.flyway_schema_history (installed_rank,version,description,type,script,checksum,installed_by,execution_time,success) VALUES
                  (1,'1','<< Flyway Baseline >>','BASELINE','<< Flyway Baseline >>',0,'root',0,1),
                  (2,'2','button_perms','SQL','V2__button_perms.sql',0,'root',0,1),
                  (3,'3','v18_tables','SQL','V3__v18_tables.sql',0,'root',0,1);
              " 2>/dev/null
            fi
            n=$(docker exec mysql mysql -uroot -proot -N -e \
              "SELECT COUNT(*) FROM $db.flyway_schema_history WHERE success=1;" 2>/dev/null | tr -d '[:space:]')
            echo "$db flyway_schema_history success rows = $n (expect >= 3)"
            [ -n "$n" ] && [ "$n" -ge 3 ] || { echo "::error::$db flyway history incomplete ($n)"; \
              docker exec mysql mysql -uroot -proot -e "SELECT installed_rank,version,description,type,success FROM $db.flyway_schema_history;" 2>/dev/null || true; exit 1; }
          done
          echo "✅ Flyway applied baseline + V2 + V3 on all 3 nodes"

      - name: Verify function menus (18 modules / 224 points)
        run: |
          cd offline/arm64-deploy
          MPASS=1
          for p in 30811 30812 30813; do
            echo "---- :$p ----"
            python3 scripts/verify_menus.py "http://127.0.0.1:$p" admin 123456 || MPASS=0
          done
          [ "$MPASS" = "1" ] || { echo "::error::menu verify failed"; exit 1; }

      - name: Verify PrimiHub logo replaced
        run: |
          cd offline/arm64-deploy
          EXP=$(wc -c < config/logo-primihub.png | tr -d ' ')
          for p in 30811 30812 30813; do
            got=$(curl -s -m8 "http://127.0.0.1:$p/images/logo-DataItem.png" | wc -c | tr -d ' ')
            echo ":$p logo bytes=$got (expect $EXP)"
            [ "$got" = "$EXP" ] || { echo "::error::logo not replaced on $p"; exit 1; }
          done

      - name: Idempotent re-deploy (cleanup-before-deploy then up again)
        run: |
          cd offline/arm64-deploy
          [ -f cleanup-before-deploy.sh ] || { echo "::error::package missing cleanup-before-deploy.sh"; exit 1; }
          # containers from the first deploy are still up → a naive `up` would hit
          # 'container name /loki already in use'. cleanup --keep-data must clear that.
          bash cleanup-before-deploy.sh --keep-data
          docker compose --env-file .env up -d
          for r in $(seq 1 20); do
            sleep 15
            running=$(docker compose --env-file .env ps --format '{{.Name}} {{.State}}' 2>/dev/null | grep -c running || true)
            echo "[redeploy r$r] running=$running"
            [ "$running" -ge 22 ] && break
          done
          [ "$running" -ge 22 ] || { echo "::error::re-deploy not 22/22 (got $running)"; docker compose --env-file .env ps -a; exit 1; }
          echo "✅ idempotent re-deploy 22/22 — cleanup resolves the container-name conflict"

      - name: Upload artifacts
        if: always()
        run: |
          cd offline/arm64-deploy
          mkdir -p out
          docker compose --env-file .env ps -a > out/ps.txt 2>&1 || true
          for c in mysql nacos-server application0 gateway0 manage-web0 meta0 node0; do
            docker logs --tail 150 "$c" > "out/$c.log" 2>&1 || true
          done
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: arm64-offline-package-verify
          path: offline/arm64-deploy/out/*
