name: Build and push Docker images
on:
  push:
    tags: [ '*.*.*' ]
  workflow_dispatch:
  # pull_request:
  #   branches:
  #     - main
  #     - develop # for test

env:
  REGISTRY: registry.cn-beijing.aliyuncs.com
  PLATFORM_IMAGE: primihub/primihub-platform
  WEB_IMAGE: primihub/primihub-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Aliyun ACR
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}
    
    - name: Extract Docker metadata
      id: metaplatform
      uses: docker/metadata-action@v4
      with:
        images: ${{ env.REGISTRY }}/${{ env.PLATFORM_IMAGE }}

    - name: Extract Docker metadata
      id: metaweb
      uses: docker/metadata-action@v4
      with:
        images: ${{ env.REGISTRY }}/${{ env.WEB_IMAGE }}

    - name: Build and push platform images
      uses: docker/build-push-action@v2
      with:
        context: .
        push: true
        platforms: linux/amd64,linux/arm64
        tags: ${{ steps.metaplatform.outputs.tags }}
        labels: ${{ steps.metaplatform.outputs.labels }}

    - name: Use Node.js 20 (build web dist)
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
        cache-dependency-path: primihub-webconsole/package-lock.json

    - name: Build web dist
      run: |
        cd primihub-webconsole
        npm ci --legacy-peer-deps
        npm run build:prod

    - name: Build and push web images
      uses: docker/build-push-action@v2
      with:
        context: ./primihub-webconsole
        push: true
        platforms: linux/amd64,linux/arm64
        tags: ${{ steps.metaweb.outputs.tags }}
        labels: ${{ steps.metaweb.outputs.labels }}
