name: mirror-arm-images

# Mirror the remaining offline-package images (arm64) into Aliyun ACR so the arm64
# offline package can be assembled by pulling everything from one fast domestic registry.
# mysql:5.7 has no arm64 -> substituted with mariadb:10.11.
on:
  push:
    branches: [ ci/mirror-arm ]
  workflow_dispatch:

env:
  ACR: registry.cn-beijing.aliyuncs.com
  NS: primihub

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Login to Aliyun ACR
        run: echo "${{ secrets.ALIYUN_PASSWORD }}" | docker login "$ACR" --username "${{ secrets.ALIYUN_USERNAME }}" --password-stdin

      - name: Mirror arm64 images
        run: |
          set -u
          # src_image|dest_repo:dest_tag
          MAP="
          docker.io/primihub/primihub-meta:1.7.0|primihub-meta:1.7.0-arm64
          docker.io/primihub/primihub-node:1.7.0|primihub-node:1.7.0-arm64
          docker.io/library/redis:7|redis:7-arm64
          docker.io/library/rabbitmq:3.6.15-management|rabbitmq:3.6.15-management-arm64
          docker.io/nacos/nacos-server:v2.4.3|nacos-server:v2.4.3-arm64
          docker.io/grafana/loki:2.9.0|loki:2.9.0-arm64
          docker.io/library/mariadb:10.11|mariadb:10.11-arm64
          "
          ok=""; bad=""
          for line in $MAP; do
            [ -z "$line" ] && continue
            src="${line%%|*}"; dst="$ACR/$NS/${line##*|}"
            echo "::group::$src -> $dst"
            if docker pull --platform=linux/arm64 "$src" 2>&1; then
              arch=$(docker image inspect "$src" -f '{{.Architecture}}')
              if [ "$arch" != "arm64" ]; then
                echo "::warning::$src resolved to $arch (no arm64 variant)"; bad="$bad $src(no-arm64)"; echo "::endgroup::"; continue
              fi
              docker tag "$src" "$dst"
              docker push "$dst" && ok="$ok ${line##*|}" || bad="$bad $src(push-fail)"
            else
              echo "::warning::pull failed for $src (likely no arm64)"; bad="$bad $src(pull-fail)"
            fi
            echo "::endgroup::"
          done
          echo "================ MIRROR SUMMARY ================"
          echo "OK:  $ok"
          echo "BAD: ${bad:-none}"
          [ -z "$bad" ] || echo "::warning::some images failed: $bad"
