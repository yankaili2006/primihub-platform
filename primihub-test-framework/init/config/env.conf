# PrimiHub Test Framework Environment Configuration
# 环境配置文件

# ===========================
# 部署环境
# ===========================
DEPLOY_ENV=dev

# ===========================
# 服务地址配置
# ===========================
# Gateway服务
GATEWAY_HOST=localhost
GATEWAY_PORT=8080
GATEWAY_URL=http://${GATEWAY_HOST}:${GATEWAY_PORT}

# Application服务
APPLICATION_HOST=localhost
APPLICATION_PORT=8090
APPLICATION_URL=http://${APPLICATION_HOST}:${APPLICATION_PORT}

# ===========================
# 数据库配置
# ===========================
DB_HOST=localhost
DB_PORT=3306
DB_NAME=privacy
DB_USER=root
DB_PASSWORD=primihub@123
DB_CHARSET=utf8mb4

# 数据库连接字符串
DB_CONNECTION="mysql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}"

# ===========================
# Redis配置
# ===========================
REDIS_HOST=localhost
REDIS_PORT=6379
REDIS_PASSWORD=
REDIS_DB=0

# ===========================
# Nacos配置
# ===========================
NACOS_HOST=localhost
NACOS_PORT=8848
NACOS_USERNAME=nacos
NACOS_PASSWORD=nacos
NACOS_NAMESPACE=demo0

# ===========================
# RabbitMQ配置
# ===========================
RABBITMQ_HOST=localhost
RABBITMQ_PORT=5672
RABBITMQ_MGMT_PORT=15672
RABBITMQ_USERNAME=guest
RABBITMQ_PASSWORD=guest

# ===========================
# 日志配置
# ===========================
LOG_DIR=./logs
LOG_LEVEL=INFO
LOG_FILE=${LOG_DIR}/init_$(date +%Y%m%d_%H%M%S).log

# ===========================
# 超时配置（秒）
# ===========================
# 服务就绪超时
SERVICE_READY_TIMEOUT=300
# API调用超时
API_TIMEOUT=30
# 数据库连接超时
DB_TIMEOUT=10
# 健康检查间隔
HEALTH_CHECK_INTERVAL=5
# 健康检查重试次数
HEALTH_CHECK_RETRIES=10

# ===========================
# 备份配置
# ===========================
# 是否在初始化前备份数据库
ENABLE_DB_BACKUP=true
# 备份目录
BACKUP_DIR=./backups
# 保留备份天数
BACKUP_RETENTION_DAYS=7

# ===========================
# 初始化选项
# ===========================
# 是否初始化测试数据
INIT_TEST_DATA=true
# 是否清除现有数据（谨慎使用）
CLEAN_EXISTING_DATA=false
# 是否跳过环境检查
SKIP_ENV_CHECK=false
# 是否跳过服务检查
SKIP_SERVICE_CHECK=false
