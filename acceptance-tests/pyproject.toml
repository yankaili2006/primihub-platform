[tool.pytest.ini_options]
# Offline invariant tests run everywhere; online acceptance tests are gated on the
# `live` marker and auto-skip when the platform is unreachable (see tests/conftest.py).
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "--strict-markers -ra"
markers = [
    "live: requires a reachable PrimiHub platform + network (online acceptance)",
]
