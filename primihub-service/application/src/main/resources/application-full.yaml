server:
  port: 8090
spring:
  application:
    name: platform
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:primihub;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    username: sa
    password: 
    hikari:
      maximum-pool-size: 5
    druid:
      primary:
        url: jdbc:h2:mem:primihub;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
        username: sa
        password: ""
        driver-class-name: org.h2.Driver
        connection-properties: ""
        filter.config.enabled: false
      secondary:
        url: jdbc:h2:mem:primihub;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
        username: sa
        password: ""
        driver-class-name: org.h2.Driver
        connection-properties: ""
        filter.config.enabled: false
    redis:
      primary:
        hostName: localhost
        port: 6379
        password: ""
        database: 0
        minIdle: 0
        maxIdle: 8
        maxTotal: 8
        lifo: true
        maxWaitMillis: 10000
        minEvictableIdleTimeMillis: 60000
        softMinEvictableIdleTimeMillis: 60000
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  redis:
    host: localhost
    port: 6379
    database: 0
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  cloud:
    nacos:
      discovery:
        enabled: false
        server-addr: localhost:8848
        namespace: dev
      config:
        enabled: false
        server-addr: localhost:8848
        namespace: dev
    stream:
      enabled: false
      binders:
        rabbit:
          type: rabbit
          environment:
            spring:
              rabbitmq:
                host: localhost
                port: 5672
  main:
    allow-bean-definition-overriding: true

# 禁用Nacos配置
nacos:
  config:
    enabled: false
    server-addr: localhost:8848
    namespace: dev
    max-retry: 3
    config-long-poll-timeout: 1000
    config-retry-time: 1000
    auto-refresh: false
    username: nacos
    password: nacos
    context-path: /nacos
    group: DEFAULT_GROUP
    file-extension: yaml

# 基础配置
base:
  tokenValidateUriBlackList:
    - "/user/login"
    - "/user/register"
    - "/user/sendVerificationCode"
    - "/user/forgetPassword"
    - "/captcha/get"
    - "/captcha/check"
    - "/oauth/getAuthList"
    - "/oauth/authLogin"
    - "/oauth/authRegister"
    - "/oauth/github/render"
    - "/oauth/github/callback"
    - "/common/getValidatePublicKey"
    - "/common/getTrackingID"
    - "/shareData/syncProject"
    - "/shareData/syncModel"
    - "/organ/getHomepage"
    # 开发环境：跳过所有业务API的token验证
    - "/model/**"
    - "/project/**"
    - "/resource/**"
    - "/psi/**"
    - "/pir/**"
    - "/reasoning/**"
    - "/task/**"
    - "/whitelist/**"
    - "/user/**"
    - "/organ/**"
    - "/data/**"
    - "/fusionResource/**"

  needSignUriList: []

  taskEmailSubject: "[PrimiHub] PrimiHub Platform Task Notification!"
  adminUserIds: [1]
  defaultPassword: "123456"
  defaultPasswordVector: "excalibur"
  primihubOfficalService: "http://127.0.0.1:8000"

  grpcClient:
    address: "192.168.99.20"
    port: 50050
    useTls: false
    trustCertFilePath: "/ca.crt"
    keyCertChainFile: "/client.crt"
    keyFile: "/client8.key"
    cacheType: "CaffeineCacheService"

  grpcServerPort: 9090
  uploadUrlDirPrefix: "/tmp/primihub/upload/"
  resultUrlDirPrefix: "/tmp/primihub/result/"
  runModelFileUrlDirPrefix: "/tmp/primihub/result/runTask/"
  usefulToken: "excalibur_forever_ABCDEFGHIJKLMN"
  systemDomainName: ""

  mailProperties:
    host: ""
    username: ""
    port: 465
    password: ""
    properties: {}

  authConfigs:
    github:
      redirectUrl: ""
      authEnable: 0
      clientId: ""
      clientSecret: ""
      redirectUri: ""

  lokiConfig:
    address: ""
    job: "primihub/application1"
    container: "application1"
    app: "application1"

  openDynamicTuning: false
  uploadSize: 10
  displayDatabaseSourceType: false

# 组件配置
components:
  modelComponents: []

# 验证码配置
aj:
  captcha:
    jigsaw: classpath:images/yyjigsaw
    cache-type: redis
    water-mark: PrimiHub
    slip-offset: 5
    aes-status: true
    interference-options: 2
    req-frequency-limit-enable: false
    req-get-lock-limit: 30
    req-get-lock-seconds: 30
    req-get-minute-limit: 10
    req-check-minute-limit: 10
    req-verify-minute-limit: 10
    type: BLOCKPUZZLE

# Swagger配置
swagger2:
  enable: true

# 日志配置
logging:
  level:
    root: info
    com.primihub: debug
  config: classpath:logback-privacy.xml