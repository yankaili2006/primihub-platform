server:
  port: 8090
spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: platform
  cloud:
    nacos:
      discovery:
        server-addr: nacos:8848
        # namespace 通过环境变量 SPRING_CLOUD_NACOS_DISCOVERY_NAMESPACE 注入，不在此处硬编码
        # 避免覆盖 docker-compose 中按节点配置的 demo0/demo1/demo2 命名空间
nacos:
  config:
    server-addr: nacos:8848
    # namespace 通过环境变量 SPRING_CLOUD_NACOS_CONFIG_NAMESPACE 注入
    namespace:
    max-retry: 3
    config-long-poll-timeout: 1000
    config-retry-time: 1000
    auto-refresh: true
    username: nacos
    password: nacos
    context-path: /nacos
    group: DEFAULT_GROUP
    file-extension: yaml
aj:
  captcha:
    jigsaw: classpath:images/yyjigsaw
    cache-type: redis
    water-mark: PrimiHub
    slip-offset: 5
    aes-status: true
    interference-options: 2
    req-frequency-limit-enable: true
    req-get-lock-limit: 30
    req-get-lock-seconds: 30
    req-get-minute-limit: 10
    req-check-minute-limit: 10
    req-verify-minute-limit: 10
    type: BLOCKPUZZLE


swagger2:
  enable: true

# 基础配置
base:
  grpc-client:
    address: primihub-node0
    port: 50050
    use-tls: false
    trust-cert-file-path: /data/javaclientcert/ca.crt
  grpc-server-port: 9090
  upload-url-dir-prefix: /data/upload/
  result-url-dir-prefix: /data/result/
  useful-token: excalibur_forever_ABCDEFGHIJKLMN
  tokenValidateUriBlackList:
    - "/user/login"
    - "/user/register"
    - "/user/sendVerificationCode"
    - "/user/forgetPassword"
    - "/captcha/get"
    - "/captcha/check"
    - "/oauth/getAuthList"
    - "/oauth/authLogin"
    - "/oauth/authRegister"
    - "/oauth/github/render"
    - "/oauth/github/callback"
    - "/common/getValidatePublicKey"
    - "/common/getTrackingID"
    - "/shareData/syncProject"
    - "/shareData/syncModel"
    - "/organ/getHomepage"
    - "/test/**"
    - "/actuator/**"

logging:
  level:
    root: info

mybatis:
  configuration:
    # 全局 snake_case→camelCase: 根除 bare SELECT*+resultType 空字段/NPE bug
    map-underscore-to-camel-case: true
