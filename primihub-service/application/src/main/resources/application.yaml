server:
  port: 8080
spring:
  profiles:
    active: simple
  application:
    name: platform
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
      file-size-threshold: 1MB
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    sql-script-encoding: utf-8
    druid:
      primary:
        driver-class-name: com.mysql.cj.jdbc.Driver
        username: root
        url: jdbc:mysql://mysql:3306/privacy1?characterEncoding=UTF-8&zeroDateTimeBehavior=convertToNull&allowMultiQueries=true&serverTimezone=Asia/Shanghai&useSSL=false
        password: root
        connection-properties: config.decrypt=false
        filter:
          config:
            enabled: true
        initial-size: 3
        min-idle: 3
        max-active: 20
        max-wait: 60000
        test-while-idle: true
        time-between-connect-error-millis: 60000
        min-evictable-idle-time-millis: 30000
        validationQuery: select 'x'
        test-on-borrow: false
        test-on-return: false
        pool-prepared-statements: true
        max-pool-prepared-statement-per-connection-size: 20
        use-global-data-source-stat: false
        filters: stat,wall,slf4j
        connect-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
        time-between-log-stats-millis: 300000
        web-stat-filter:
          enabled: true
          url-pattern: '/*'
          exclusions: '*.js,*.gif,*.jpg,*.bmp,*.png,*.css,*.ico,/druid/*'
        stat-view-servlet:
          enabled: true
          url-pattern: '/druid/*'
          allow: 127.0.0.1,192.168.0.1
          deny: 192.168.0.128
          reset-enable: false
          login-username: admin
          login-password: admin
  rabbitmq:
    host: rabbitmq-mq
    port: 5672
    username: guest
    password: guest
  cloud:
    stream:
      bindings:
        singleTaskOutput:
          destination: singlTaskChannel
        singleTaskInput:
          destination: singlTaskChannel
          group: single
        singleSeatunnelInput:
          destination: seatunnel
          group: data
    nacos:
      discovery:
        server-addr: nacos:8848
        namespace: dev
      config:
        enabled: false
        server-addr: nacos:8848
        namespace: dev
        group: DEFAULT_GROUP
        file-extension: yaml
        username: nacos
        password: nacos
rest:
  template:
    connection:
      connect-timeout: 30000
      read-timeout: 30000

logging:
  level:
    root: info
  config: classpath:logback-privacy.xml

