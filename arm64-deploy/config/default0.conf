server {
    listen       80;
    server_name  localhost;

    client_max_body_size 10m;

    location / {
        root   /usr/local/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;

        # 禁用缓存，强制浏览器加载最新文件
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";

        # 动态替换平台名称 PrimiHub -> PrimiHub
        sub_filter 'PrimiHub' 'PrimiHub';
        # 注入自定义logo CSS
        sub_filter '</head>' '<link rel="stylesheet" href="/static/css/custom-logo.css"></head>';
        sub_filter_once off;
        sub_filter_types text/html text/css text/javascript application/javascript application/json;
    }
    
    # 重写 /sys 路径（新版本后端移除了 /sys 前缀）
    location  ^~ /prod-api/sys/ {
        rewrite ^/prod-api/sys/(.*)$ /platform/$1 break;
        proxy_pass http://gateway0:8080;
        proxy_set_header Host   $host;
        proxy_set_header X-Real-IP      $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 重写 /data 路径（新版本后端移除了 /data 前缀）
    location  ^~ /prod-api/data/ {
        rewrite ^/prod-api/data/(.*)$ /platform/$1 break;
        proxy_pass http://gateway0:8080;
        proxy_set_header Host   $host;
        proxy_set_header X-Real-IP      $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location  ^~ /prod-api/ {
    	proxy_pass http://gateway0:8080/platform/;
        proxy_set_header Host   $host;
        proxy_set_header X-Real-IP      $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~  /prod-api/dataShare/ {
    	proxy_pass http://118.190.39.100:30002/dataShare/;
    }

    location /assets/ {
    	alias /data/upload/2/;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   html;
    }
}
